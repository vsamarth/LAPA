[project]
name = "lapa"
version = "0.1.0"
description = "Latent Action Pre-Training (LAPA)"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "flax==0.7.0",
    "optax==0.1.7",
    "chex==0.1.82",
    "einops",
    "transformers==4.29.2",
    "datasets==2.13.0",
    "tqdm",
    "ml_collections",
    "wandb",
    "gcsfs",
    "requests",
    "typing-extensions",
    "sentencepiece",
    "Pillow",
    "ipdb",
    "imageio[ffmpeg]",
    "decord",
    "tiktoken",
    "jax==0.4.23",
    "tensorflow",
    "scipy==1.12.0",
    "albumentations",
    "uvicorn",
    "fastapi",
    "tux @ git+https://github.com/lhao499/tux.git",
    "laq",
    "simpler_env",
    "mani_skill2_real2sim",
    "latent_pretraining",
]

[tool.uv.workspace]
members = [
    "laq",
    "SimplerEnv",
    "SimplerEnv/ManiSkill2_real2sim",
    "latent_pretraining",
]

[[tool.uv.index]]
name = "jax-cuda-releases"
url = "https://storage.googleapis.com/jax-releases/jax_cuda_releases.html"
explicit = true

[tool.uv.sources]
tux = { git = "https://github.com/lhao499/tux.git"}
laq = { workspace = true }
simpler_env = { workspace = true }
mani_skill2_real2sim = { workspace = true }
latent_pretraining = { workspace = true }
jax = { index = "jax-cuda-releases" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
